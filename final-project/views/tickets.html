<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="author" content="Prisha Garg">
    <meta name="keywords" content="Museum, Carnegie Mellon University, Information Systems">
    <meta name="description" content="MonoMuse website redesign project">
    <title>MonoMuse</title>
    <link rel="stylesheet" href="../static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="../static/script.js" defer></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body onload="addYear()">
    <div class="container">
        <header class="header">
            <img id="logo" src="../static/monomuselogo.png" alt="MonoMuse Museum Logo">
        </header>

        <nav class="nav_bar" id="myTopnav">
            <a href="javascript:void(0);" class="icon" onclick="toggleMenu()">&#9776;</a>
            <a href="../index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="exhibitions.html">Exhibitions</a>
            <a class="cta" href="tickets.html">Buy Tickets</a>
        </nav>
        <main class="main">
            <h1>Tickets & Booking</h1>

            <h3>Ticket Prices</h3>
            <table>
                <tr><th>Type</th><th>Price</th></tr>
                <tr><td>General</td><td>$20</td></tr>
                <tr><td>Student</td><td>$12</td></tr>
            </table>

            <h3>Select a Date</h3>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Availability</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>April 12, 2026</td>
                        <td>Available</td>
                        <td><button class="buy-now-btn" onclick="showCheckout()">Buy Now</button></td>
                    </tr>
                    <tr>
                        <td>April 15, 2026</td>
                        <td>Limited</td>
                        <td><button class="buy-now-btn" onclick="showCheckout()">Buy Now</button></td>
                    </tr>
                </tbody>
            </table>

            <div id="checkoutSection" style="display: none; margin-top: 40px; padding: 20px; border-top: 2px solid #e63946;">
                <h2>Checkout</h2>
                <form id="purchaseForm" onsubmit="event.preventDefault(); alert('Redirecting to payment system.');">
                    <label>Full Name:</label>
                    <input type="text" required>

                    <label>Email:</label>
                    <input type="email" required>

                    <label>Quantity:</label>
                    <input type="number" min="1" value="1">

                    <button type="submit">Complete Purchase</button>
                </form>
            </div>
        </main>

        <footer class="footer">
            <p>© MonoMuse. All rights reserved.</p>
            <p id="copyYear"></p>
        </footer>

    </div>
</body>
